<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Downloader</title>

<style>

body{
background:#0b1220;
font-family:Arial;
margin:0;
color:white;
}

.page{
display:none;
padding:20px;
text-align:center;
}

.active{
display:block;
}

input{
width:90%;
padding:14px;
border-radius:25px;
border:none;
margin-top:10px;
outline:none;
}

button{
margin-top:15px;
padding:14px;
width:90%;
background:#3b82f6;
border:none;
border-radius:25px;
color:white;
font-size:16px;
cursor:pointer;
}

video{
width:90%;
margin-top:20px;
border-radius:10px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav button{
background:none;
border:none;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<!-- HOME PAGE -->

<div id="home" class="page active">

<h2>Video Downloader</h2>

<input id="link" placeholder="Paste video link">

<button onclick="download()">Download</button>

</div>

<!-- DOWNLOAD PAGE -->

<div id="downloads" class="page">

<h2>Your Download</h2>

<video id="player" controls></video>

<a id="downloadBtn" href="#" download>
<button>Download Video</button>
</a>

</div>

<!-- BOTTOM MENU -->

<div class="nav">

<button onclick="showPage('home')">Home</button>

<button onclick="showPage('downloads')">Downloads</button>

</div>

<script>

function showPage(page){

document.getElementById("home").classList.remove("active")
document.getElementById("downloads").classList.remove("active")

document.getElementById(page).classList.add("active")

}

async function download(){

let link=document.getElementById("link").value

let res = await fetch("https://YOUR-RAILWAY-APP.up.railway.app/download",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:link})
})

let data = await res.json()

let video=document.getElementById("player")

video.src=data.video

document.getElementById("downloadBtn").href=data.video

showPage("downloads")

}

</script>

</body>
</html>
