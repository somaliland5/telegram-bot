<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

input {
  width: 90%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  outline: none;
  margin-top: 20px;
}

button {
  width: 90%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 25px;
  background: #3b82f6;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

video {
  width: 90%;
  margin-top: 20px;
  border-radius: 10px;
  display: none;
}

#status {
  margin-top: 15px;
  color: #aaa;
}

.top-btn {
  position: fixed;
  top: 10px;
  right: 10px;
  background: #22c55e;
  border-radius: 50%;
  width: 45px;
  height: 45px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Download TikTok Video</h2>

  <input id="link" placeholder="Paste TikTok link here">

  <button onclick="downloadVideo()">Download</button>

  <p id="status"></p>

  <video id="video" controls></video>
</div>

<!-- Telegram Bot Button -->
<button class="top-btn" onclick="openBot()">🤖</button>

<script>
function openBot(){
  window.open("https://t.me/Downloadvedioytibot", "_blank");
}

async function downloadVideo(){
  let url = document.getElementById("link").value;
  let status = document.getElementById("status");
  let video = document.getElementById("video");

  if(!url){
    alert("Please paste link");
    return;
  }

  status.innerText = "Processing video... ⏳";

  try {
    // 🔥 API CALL (backend required)
    let res = await fetch("/api/download?url=" + encodeURIComponent(url));
    let data = await res.json();

    if(data.success){
      video.src = data.download_url;
      video.style.display = "block";
      video.load();

      status.innerText = "Done ✔️ Video ready";
    } else {
      status.innerText = "Failed ❌ Try another link";
    }

  } catch(err){
    status.innerText = "Error connecting API ❌";
  }
}
</script>

</body>
</html>
