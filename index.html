<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Downloader</title>

<style>

body{
background:#0b1220;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

.container{
text-align:center;
width:340px;
}

input{
width:100%;
padding:14px;
border-radius:25px;
border:none;
margin-top:10px;
outline:none;
}

button{
margin-top:15px;
padding:14px;
width:100%;
background:#3b82f6;
border:none;
border-radius:25px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

video{
width:100%;
margin-top:20px;
border-radius:10px;
display:none;
}

.history{
margin-top:25px;
text-align:left;
}

.history a{
color:#60a5fa;
text-decoration:none;
display:block;
margin-top:6px;
font-size:14px;
}

.history a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="container">

<h2>Download Video</h2>

<input id="link" placeholder="Paste video link">

<button onclick="send()">Download</button>

<video id="player" controls style="width:100%;margin-top:20px;display:none"></video>

<div class="history">
<h3>History</h3>
<div id="historyList"></div>
</div>

</div>

<script>

let botToken="BOT_TOKEN"
let chatId="CHAT_ID"

function send(){

let link=document.getElementById("link").value

if(!link){
alert("Paste video link")
return
}

fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:chatId,
text:link
})
})

saveHistory(link)

alert("Link sent to downloader bot")

}

function saveHistory(link){

let history=JSON.parse(localStorage.getItem("history")||"[]")

history.unshift(link)

localStorage.setItem("history",JSON.stringify(history))

loadHistory()

}

function loadHistory(){

let history=JSON.parse(localStorage.getItem("history")||"[]")

let div=document.getElementById("historyList")

div.innerHTML=""

history.forEach(link=>{
div.innerHTML+=`<a href="${link}" target="_blank">${link}</a>`
})

}

loadHistory()

</script>

</body>
</html>

<script>

async function send(){

let link=document.getElementById("link").value

let res = await fetch("https://YOUR-RAILWAY-APP.up.railway.app/download",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:link})
})

let data = await res.json()

let video = document.getElementById("player")

video.src = data.video
video.style.display="block"

}

</script>
