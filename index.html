<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Video Downloader</title>

<style>

body{
background:#0b1220;
font-family:Arial;
margin:0;
color:white;
text-align:center;
}

.page{
display:none;
padding:25px;
}

.active{
display:block;
}

input{
width:90%;
padding:14px;
border-radius:25px;
border:none;
margin-top:10px;
outline:none;
}

button{
margin-top:15px;
padding:14px;
width:90%;
background:#3b82f6;
border:none;
border-radius:25px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

video{
width:90%;
margin-top:20px;
border-radius:10px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav button{
background:none;
border:none;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login" class="page active">

<h2>Login</h2>

<input id="login_email" placeholder="Gmail">

<input id="login_pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<a onclick="showPage('signup')" style="color:#60a5fa;cursor:pointer">
Create account
</a>

</div>

<!-- SIGNUP -->

<div id="signup" class="page">

<h2>Signup</h2>

<input id="signup_email" placeholder="Gmail">

<input id="signup_pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<br><br>

<a onclick="showPage('login')" style="color:#60a5fa;cursor:pointer">
Back to login
</a>

</div>

<!-- VERIFY -->

<div id="verify" class="page">

<h2>Email Verification</h2>

<input id="verify_code" placeholder="Enter code">

<button onclick="verify()">Verify</button>

</div>

<!-- DOWNLOADER -->

<div id="home" class="page">

<h2>VIP Video Downloader</h2>

<input id="link" placeholder="Paste video link">

<button onclick="downloadVideo()">Download</button>

</div>

<!-- VIDEO PAGE -->

<div id="downloads" class="page">

<h2>Your Video</h2>

<video id="player" controls></video>

<a id="downloadBtn" href="#" download>
<button>Download Video</button>
</a>

</div>

<!-- NAV -->

<div class="nav">

<button onclick="showPage('home')">Home</button>

<button onclick="showPage('downloads')">Downloads</button>

<button onclick="logout()">Logout</button>

</div>

<script>

let API="https://telegram-bot-production-c8d3.up.railway.app"

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}

function checkLogin(){

let logged=localStorage.getItem("logged")

if(logged=="true"){
showPage("home")
}else{
showPage("login")
}

}

checkLogin()

async function signup(){

let email=document.getElementById("signup_email").value
let password=document.getElementById("signup_pass").value

let res = await fetch(API+"/signup",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
})

let data = await res.json()

alert(data.message)

showPage("verify")

}

async function verify(){

let code=document.getElementById("verify_code").value

let res = await fetch(API+"/verify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
code:code
})
})

let data = await res.json()

alert(data.message)

showPage("login")

}

async function login(){

let email=document.getElementById("login_email").value
let password=document.getElementById("login_pass").value

let res = await fetch(API+"/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
})

let data = await res.json()

alert(data.message)

if(data.success){

localStorage.setItem("logged","true")

showPage("home")

}

}

function logout(){

localStorage.removeItem("logged")

showPage("login")

}

async function downloadVideo(){

let link=document.getElementById("link").value

let res = await fetch(API+"/download",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:link})
})

let data = await res.json()

let video=document.getElementById("player")

video.src=data.video

document.getElementById("downloadBtn").href=data.video

showPage("downloads")

}

</script>

</body>
</html>
