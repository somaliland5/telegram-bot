<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VIP Video Downloader</title>

<style>

body{
background:#0b1220;
font-family:Arial;
margin:0;
color:white;
}

.page{
display:none;
padding:25px;
text-align:center;
}

.active{
display:block;
}

input{
width:90%;
padding:14px;
border-radius:25px;
border:none;
margin-top:10px;
outline:none;
}

button{
margin-top:15px;
padding:14px;
width:90%;
background:#3b82f6;
border:none;
border-radius:25px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

video{
width:90%;
margin-top:20px;
border-radius:10px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#111827;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.nav button{
background:none;
border:none;
color:white;
font-size:16px;
}

a{
color:#60a5fa;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="login" class="page active">

<h2>Login</h2>

<input id="login_email" placeholder="Gmail">

<input id="login_pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<br><br>

<a onclick="showPage('signup')">Create Account</a>

</div>

<!-- SIGNUP PAGE -->

<div id="signup" class="page">

<h2>Create Account</h2>

<input id="signup_email" placeholder="Gmail">

<input id="signup_pass" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<br><br>

<a onclick="showPage('login')">Back to Login</a>

</div>

<!-- VERIFY PAGE -->

<div id="verify" class="page">

<h2>Email Verification</h2>

<input id="verify_code" placeholder="Enter Code">

<button onclick="verify()">Verify</button>

</div>

<!-- HOME DOWNLOADER -->

<div id="home" class="page">

<h2>VIP Video Downloader</h2>

<input id="link" placeholder="Paste video link">

<button onclick="downloadVideo()">Download</button>

</div>

<!-- DOWNLOAD PAGE -->

<div id="downloads" class="page">

<h2>Your Download</h2>

<video id="player" controls></video>

<a id="downloadBtn" href="#" download>
<button>Download Video</button>
</a>

</div>

<!-- MENU -->

<div class="nav">

<button onclick="showPage('home')">Home</button>

<button onclick="showPage('downloads')">Downloads</button>

</div>

<script>

let API="https://telegram-bot-production-c8d3.up.railway.app"

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(page).classList.add("active")

}

async function signup(){

let email=document.getElementById("signup_email").value
let password=document.getElementById("signup_pass").value

let res = await fetch(API+"/signup",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
})

let data = await res.json()

alert(data.message)

showPage("verify")

}

async function verify(){

let code=document.getElementById("verify_code").value

let res = await fetch(API+"/verify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
code:code
})
})

let data = await res.json()

alert(data.message)

showPage("login")

}

async function login(){

let email=document.getElementById("login_email").value
let password=document.getElementById("login_pass").value

let res = await fetch(API+"/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:email,
password:password
})
})

let data = await res.json()

alert(data.message)

if(data.success){
showPage("home")
}

}

async function downloadVideo(){

let link=document.getElementById("link").value

let res = await fetch(API+"/download",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:link})
})

let data = await res.json()

let video=document.getElementById("player")

video.src=data.video

document.getElementById("downloadBtn").href=data.video

showPage("downloads")

}

</script>

</body>
</html>
