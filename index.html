<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIP Video Downloader</title>

<style>
/* ===== Colors & Theme ===== */
:root {
  --bg-color: #0b1220;
  --text-color: white;
  --input-bg: #1f2937;
  --button-bg: #3b82f6;
  --button-hover: #2563eb;
  --nav-bg: #111827;
}

body.light {
  --bg-color: #f5f5f5;
  --text-color: #111827;
  --input-bg: #ffffff;
  --button-bg: #3b82f6;
  --button-hover: #2563eb;
  --nav-bg: #e5e7eb;
}

body {
  background: var(--bg-color);
  color: var(--text-color);
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  transition: all 0.3s;
}

.page {
  display: none;
  padding: 25px;
}

.active {
  display: block;
}

input {
  width: 90%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  margin-top: 10px;
  outline: none;
  background: var(--input-bg);
  color: var(--text-color);
}

button {
  margin-top: 15px;
  padding: 14px;
  width: 90%;
  background: var(--button-bg);
  border: none;
  border-radius: 25px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.2s;
}

button:hover {
  background: var(--button-hover);
}

video {
  width: 90%;
  margin-top: 20px;
  border-radius: 10px;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: var(--nav-bg);
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
}

.nav button {
  background: none;
  border: none;
  color: var(--text-color);
  font-size: 16px;
  cursor: pointer;
}

.toggle-theme {
  position: fixed;
  top: 10px;
  right: 20px;
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: var(--button-bg);
  color: white;
  font-weight: bold;
}

.footer {
  position: fixed;
  bottom: 50px;
  width: 100%;
  text-align: center;
  color: gray;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- ===== THEME TOGGLE ===== -->
<button class="toggle-theme" onclick="toggleTheme()">Light</button>

<!-- ===== HOME PAGE ===== -->
<div id="home" class="page active">
  <h2>VIP Video Downloader</h2>
  <input id="link" placeholder="Paste video link">
  <button onclick="downloadVideo()">Download</button>
</div>

<!-- ===== DOWNLOAD PAGE ===== -->
<div id="downloads" class="page">
  <h2>Your Video</h2>
  <video id="player" controls></video>
  <a id="downloadBtn" href="#" download>
    <button>Download Video</button>
  </a>
</div>

<!-- ===== NAVIGATION ===== -->
<div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('downloads')">Downloads</button>
</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
  By: ＳＣＨＯＬＥＳ🥤🥇
</div>

<script>
/* ===== PAGE NAVIGATION ===== */
function showPage(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}

/* ===== THEME TOGGLE ===== */
function toggleTheme() {
  document.body.classList.toggle("light");
  const btn = document.querySelector(".toggle-theme");
  btn.textContent = document.body.classList.contains("light") ? "Dark" : "Light";
}

/* ===== VIDEO DOWNLOAD FUNCTION ===== */
async function downloadVideo() {
  let link = document.getElementById("link").value;
  if(!link) { alert("Please paste a video link!"); return; }

  // Replace with your backend API URL if you have one
  // Example: let API = "https://YOUR_RAILWAY_URL";
  let API = "";

  if(API) {
    try {
      let res = await fetch(API + "/download", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url: link})
      });
      let data = await res.json();
      document.getElementById("player").src = data.video;
      document.getElementById("downloadBtn").href = data.video;
    } catch(err) {
      alert("Backend not connected. Video URL will be used directly.");
      document.getElementById("player").src = link;
      document.getElementById("downloadBtn").href = link;
    }
  } else {
    // If no backend, use link directly
    document.getElementById("player").src = link;
    document.getElementById("downloadBtn").href = link;
  }

  showPage("downloads");
}
</script>

</body>
</html>
